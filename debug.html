<!DOCTYPE html>
<html>
<head>
    <title>Debug Practice</title>

    <!-- CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            text-align: center;
        }

        .box {
            width: 300px;
            height: 200px;
            background: lightblue;
            margin: 20px auto; /* center properly */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        /* Responsive Fix */
        @media (max-width: 600px) {
            .container {
                width: 90%;
            }

            .box {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My Website</h1>

        <div class="box">
            <p id="text">Click the button</p>
            <button onclick="changeText()">Click Me</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        function changeText() {
            document.getElementById("text").innerHTML = "Text Changed";
        }

        function addNumbers(a, b) {
            if (a === undefined || b === undefined) {
                return "Please provide two numbers";
            }
            return a + b;
        }

        console.log(addNumbers(5, 3)); // fixed call
    </script>

</body>
</html>
